<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Families Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
        </nav>
      </header>

      <section class="card hero" style="margin-top: 18px;">
        <h1 class="title">Your Families</h1>
        <p class="subtle">Choose a family space to enter the chat.</p>
        <div class="grid-links">
          <div class="card link-card">
            <span class="badge">Active</span>
            <strong>Smith Family</strong>
            <span class="subtle">Code: A1B2C3D4</span>
            <div class="post-actions">
              <span>Admin</span>
              <span>12 members</span>
            </div>
            <button class="btn primary">Enter</button>
          </div>
          <div class="card link-card">
            <span class="badge">Member</span>
            <strong>Hassan Family</strong>
            <span class="subtle">Code: Q7W9E2R1</span>
            <div class="post-actions">
              <span>Member</span>
              <span>8 members</span>
            </div>
            <button class="btn ghost">Enter</button>
          </div>
          <div class="card link-card">
            <span class="badge coral">Pending</span>
            <strong>Amin Family</strong>
            <span class="subtle">Waiting approval</span>
            <div class="post-actions">
              <span>Requested 2 days ago</span>
            </div>
            <button class="btn ghost">View status</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

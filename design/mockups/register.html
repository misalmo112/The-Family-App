<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
          <a href="login.html">Login</a>
          <a class="active" href="register.html">Register</a>
        </nav>
      </header>

      <section class="card hero" style="margin-top: 18px; max-width: 760px;">
        <h1 class="title">Create your account</h1>
        <p class="subtle">Your profile will be reused across families.</p>

        <div class="form-grid" style="margin-top: 16px;">
          <input class="input" placeholder="First name" />
          <input class="input" placeholder="Last name" />
          <input class="input" placeholder="Username" />
          <input class="input" placeholder="Email" />
          <input class="input" placeholder="Date of birth" />
          <input class="input" placeholder="Gender" />
        </div>

        <div class="stack" style="margin-top: 12px;">
          <input class="input" placeholder="Password" type="password" />
          <input class="input" placeholder="Confirm password" type="password" />
        </div>

        <div style="margin-top: 16px; display: flex; gap: 10px;">
          <button class="btn ghost">Back</button>
          <button class="btn primary">Create account</button>
        </div>

        <div class="footer-note">
          Already have an account? Sign in instead.
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Topology Detail Drawer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
        </nav>
      </header>

      <div class="split" style="margin-top: 18px;">
        <section class="card hero">
          <div class="post-header">
            <div>
              <div class="post-title">Topology Canvas</div>
              <div class="meta">Select nodes to view details</div>
            </div>
            <span class="badge">Admin</span>
          </div>
          <div class="graph-board" style="margin-top: 16px;">
            <svg viewBox="0 0 640 360" aria-hidden="true">
              <rect x="0" y="0" width="640" height="360" fill="rgba(255,255,255,0.35)" />
              <line x1="160" y1="80" x2="320" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="2" />
              <line x1="480" y1="80" x2="320" y2="200" stroke="rgba(0,0,0,0.15)" stroke-width="2" />
              <rect x="100" y="50" rx="18" ry="18" width="120" height="60" fill="rgba(0,194,168,0.14)" stroke="rgba(0,194,168,0.4)" />
              <text x="160" y="85" text-anchor="middle" font-size="12" fill="#1c1f2a" font-weight="700">Amina</text>
              <rect x="420" y="50" rx="18" ry="18" width="120" height="60" fill="rgba(0,194,168,0.14)" stroke="rgba(0,194,168,0.4)" />
              <text x="480" y="85" text-anchor="middle" font-size="12" fill="#1c1f2a" font-weight="700">Khaled</text>
              <rect x="260" y="170" rx="18" ry="18" width="120" height="60" fill="rgba(0,194,168,0.22)" stroke="rgba(0,194,168,0.6)" />
              <text x="320" y="205" text-anchor="middle" font-size="12" fill="#1c1f2a" font-weight="700">Omar</text>
            </svg>
          </div>
        </section>

        <aside class="card drawer">
          <div class="post-title">Person Details</div>
          <div class="meta">Selected: Omar Abdallah</div>
          <div class="divider"></div>
          <div class="section-title">Quick actions</div>
          <div class="pill-row">
            <span class="node-chip">Set as viewer</span>
            <span class="node-chip">Edit name</span>
            <span class="node-chip">Add parent</span>
            <span class="node-chip">Add spouse</span>
          </div>
          <div class="divider"></div>
          <div class="section-title">Relations</div>
          <div class="panel-list">
            <div class="muted-block">Parent: Amina</div>
            <div class="muted-block">Parent: Khaled</div>
            <div class="muted-block">Child: Maya</div>
            <div class="muted-block">Spouse: Leila</div>
          </div>
          <div class="divider"></div>
          <div class="section-title">Audit</div>
          <div class="meta">Created by Omar • 2 days ago</div>
        </aside>
      </div>
    </main>
  </body>
</html>

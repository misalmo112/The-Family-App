<!doctype html>

    <title>Login Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>

        <nav class="nav">

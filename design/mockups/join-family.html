<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join Family Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
        </nav>
      </header>

      <section class="card hero" style="margin-top: 18px; max-width: 760px;">
        <h1 class="title">Join a Family</h1>
        <p class="subtle">Use the private family code provided by an admin.</p>
        <div class="split" style="margin-top: 16px;">
          <div class="stack">
            <div class="section-title">Family code</div>
            <input class="input" placeholder="A1B2C3D4" />
            <div class="muted-block">
              Your profile data will be used automatically.
            </div>
            <button class="btn primary">Submit request</button>
          </div>
          <div class="stack">
            <div class="section-title">Already listed?</div>
            <input class="input" placeholder="Person ID" />
            <button class="btn ghost">Request as listed person</button>
            <div class="footer-note">
              Ask a family admin for your person ID if needed.
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

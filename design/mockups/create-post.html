<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Post Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
        </nav>
      </header>

      <section class="card hero" style="margin-top: 18px; max-width: 720px;">
        <h1 class="title">Create a Post</h1>
        <p class="subtle">
          Long-form updates live inside the family chat timeline.
        </p>
        <div class="stack" style="margin-top: 16px;">
          <div class="segmented">
            <button class="seg">Message</button>
            <button class="seg active">Post</button>
            <button class="seg">Announcement</button>
          </div>
          <input class="input" placeholder="Post title (optional)" />
          <textarea class="input textarea" placeholder="Share the full update here..."></textarea>
          <div style="display: flex; gap: 10px;">
            <button class="btn ghost">Cancel</button>
            <button class="btn primary">Publish post</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Join Requests Mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-badge"></span>
          Family Network
        </div>
        <nav class="nav">
          <a href="index.html">Index</a>
          <a href="feed.html">Feed</a>
          <a href="profile.html">Profile</a>
          <a href="onboarding.html">Onboarding</a>
        </nav>
      </header>

      <section class="card hero" style="margin-top: 18px;">
        <h1 class="title">Join Requests</h1>
        <p class="subtle">Review and approve new family members.</p>
        <div class="stack">
          <div class="post-card">
            <div class="post-header">
              <div>
                <div class="post-title">Sara Lin</div>
                <div class="meta">Requested to join Smith Family</div>
              </div>
              <span class="badge">Pending</span>
            </div>
            <div class="post-body">
              Wants to join as a new person (profile data will be used).
            </div>
            <div class="post-actions">
              <button class="btn ghost">View details</button>
              <button class="btn danger">Reject</button>
              <button class="btn primary">Approve</button>
            </div>
          </div>

          <div class="post-card">
            <div class="post-header">
              <div>
                <div class="post-title">Omar Abdallah</div>
                <div class="meta">Requested to join Hassan Family</div>
              </div>
              <span class="badge">Pending</span>
            </div>
            <div class="post-body">
              Joining as existing person ID 12.
            </div>
            <div class="post-actions">
              <button class="btn ghost">View details</button>
              <button class="btn danger">Reject</button>
              <button class="btn primary">Approve</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
